<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍵 BTCC 2nd XI – Teas Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 2px 16px rgba(0,0,0,0.1);
  }
  .card-header { text-align: center; margin-bottom: 1.5rem; }
  .badge {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 0.6rem;
  }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.2rem; }
  .subtitle { font-size: 13px; color: #999; }
  .tabs {
    display: flex;
    gap: 0;
    border-radius: 10px;
    background: #f0f2f5;
    padding: 3px;
    margin-bottom: 1.25rem;
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    border: none;
    background: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: #fff;
    color: #1a1a1a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .players { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.25rem; }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    background: #f8f9fa;
    border: 1.5px solid #e9ecef;
    transition: all 0.15s;
  }
  .player-row.done-teas { background: #fff8e1; border-color: #ffe082; }
  .player-row.skipped { opacity: 0.4; background: #fff; border-color: #f0f0f0; }
  .player-num { font-size: 12px; color: #aaa; width: 16px; flex-shrink: 0; text-align: center; }
  .player-name { flex: 1; font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .player-row.skipped .player-name { text-decoration: line-through; color: #bbb; }
  .teas-badge {
    font-size: 11px;
    background: #fff3cd;
    color: #856404;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .row-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #e9ecef;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .row-btn:hover { background: #dee2e6; }
  .add-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .add-row input {
    flex: 1;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1.5px solid #e9ecef;
    font-size: 14px;
    color: #1a1a1a;
    outline: none;
    background: #f8f9fa;
  }
  .add-row input:focus { border-color: #25D366; background: #fff; }
  .add-row button {
    padding: 9px 16px;
    border-radius: 10px;
    border: none;
    background: #25D366;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .big-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .big-btn:active { transform: scale(0.98); }
  .big-btn.green { background: #25D366; color: #fff; }
  .big-btn.green:hover { background: #1ebe5d; }
  .big-btn.green:disabled { background: #a5d6a7; cursor: not-allowed; }
  .big-btn.outline {
    background: #fff;
    color: #555;
    border: 1.5px solid #e9ecef;
    font-size: 14px;
    font-weight: 500;
  }
  .big-btn.outline:hover { background: #f8f9fa; }
  .result {
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    border-radius: 12px;
    background: #f8f9fa;
    padding: 1rem;
    margin-bottom: 10px;
    text-align: center;
  }
  .result-name { font-size: 24px; font-weight: 700; color: #1a1a1a; }
  .result-sub { font-size: 13px; color: #888; }
  .rolling { animation: roll 0.1s ease-in-out infinite alternate; }
  @keyframes roll {
    from { opacity: 0.3; transform: scale(0.97); }
    to   { opacity: 1;   transform: scale(1); }
  }
  .history-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.25rem; }
  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 10px;
    background: #f8f9fa;
    border: 1.5px solid #e9ecef;
    font-size: 14px;
  }
  .history-name { font-weight: 500; color: #1a1a1a; }
  .history-date { font-size: 12px; color: #aaa; }
  .history-del { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0 4px; }
  .history-del:hover { color: #e24b4a; }
  .empty-state { text-align: center; color: #bbb; font-size: 14px; padding: 1.5rem 0; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #bbb;
    margin-bottom: 8px;
  }
  .match-info { font-size: 12px; color: #ccc; text-align: center; margin-top: 0.75rem; line-height: 1.6; }
  .info-box {
    background: #fff8e1;
    border: 1.5px solid #ffe082;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: #856404;
    margin-bottom: 1.25rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="badge">BTCC 2nd XI</div>
    <h1>🍵 Teas Picker</h1>
    <p class="subtitle">Kent Cricket League · Division 9</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('pick')">🎲 Pick</button>
    <button class="tab" onclick="showTab('team')">👥 Team</button>
    <button class="tab" onclick="showTab('history')">📋 History</button>
  </div>

  <!-- PICK SCREEN -->
  <div class="screen active" id="screen-pick">
    <div id="pickInfo" class="info-box" style="display:none;"></div>
    <div class="players" id="pickList"></div>
    <button class="big-btn green" id="spinBtn" onclick="pick()">🎲 Pick teas volunteer</button>
    <div class="result" id="result">
      <span class="result-sub">Press the button to pick someone</span>
    </div>
    <button class="big-btn outline" id="confirmBtn" style="display:none;" onclick="confirmWinner()">✅ Confirm &amp; save to history</button>
    <p class="match-info">Hayes Lane, Bromley · Meet 11:15 · Start 1:00 pm<br>Umpire: J. Twose</p>
  </div>

  <!-- TEAM SCREEN -->
  <div class="screen" id="screen-team">
    <p class="section-label">Current squad</p>
    <div class="players" id="teamList"></div>
    <p class="section-label">Add player</p>
    <div class="add-row">
      <input type="text" id="newPlayerInput" placeholder="Full name" onkeydown="if(event.key==='Enter')addPlayer()" />
      <button onclick="addPlayer()">Add</button>
    </div>
    <button class="big-btn outline" onclick="resetToDefault()">↩ Reset to default squad</button>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen" id="screen-history">
    <p class="section-label">Teas done this cycle</p>
    <div class="history-list" id="historyList"></div>
    <button class="big-btn outline" onclick="clearHistory()">🗑 Clear all history (new cycle)</button>
  </div>
</div>

<script>
const DEFAULT_TEAM = [
  "Mathar Saeed","Lewis Dicker","Tom Breakey","Chris Doyle",
  "Kane Boenke","Sam Doyle","Michael Slamon"
];

function loadTeam() {
  const s = localStorage.getItem('btcc_team');
  return s ? JSON.parse(s) : [...DEFAULT_TEAM];
}
function saveTeam(t) { localStorage.setItem('btcc_team', JSON.stringify(t)); }

function loadHistory() {
  const s = localStorage.getItem('btcc_teas_history');
  return s ? JSON.parse(s) : [];
}
function saveHistory(h) { localStorage.setItem('btcc_teas_history', JSON.stringify(h)); }

function whoHasDoneTeas() {
  return new Set(loadHistory().map(h => h.name));
}

let currentWinner = null;

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['pick','team','history'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  if (tab === 'pick') renderPick();
  if (tab === 'team') renderTeam();
  if (tab === 'history') renderHistory();
}

function renderPick() {
  const team = loadTeam();
  const done = whoHasDoneTeas();
  const list = document.getElementById('pickList');
  const infoBox = document.getElementById('pickInfo');

  list.innerHTML = '';

  if (team.length === 0) {
    list.innerHTML = '<div class="empty-state">No players in team.<br>Go to Team tab to add some.</div>';
    infoBox.style.display = 'none';
    return;
  }

  const eligible = team.filter(p => !done.has(p));

  if (eligible.length === 0) {
    infoBox.style.display = 'block';
    infoBox.textContent = '🔄 Everyone has done teas this cycle! History cleared — starting fresh.';
    saveHistory([]);
  } else if (done.size > 0) {
    infoBox.style.display = 'block';
    infoBox.textContent = '🟡 Crossed-out players have already done teas this cycle and are excluded from the draw.';
  } else {
    infoBox.style.display = 'none';
  }

  const freshDone = whoHasDoneTeas();

  team.forEach((p, i) => {
    const isDone = freshDone.has(p);
    const row = document.createElement('div');
    row.className = 'player-row' + (isDone ? ' skipped' : '');

    const num = document.createElement('span');
    num.className = 'player-num';
    num.textContent = i + 1;

    const name = document.createElement('span');
    name.className = 'player-name';
    name.textContent = p;

    row.appendChild(num);
    row.appendChild(name);

    if (isDone) {
      const badge = document.createElement('span');
      badge.className = 'teas-badge';
      badge.textContent = '✓ done';
      row.appendChild(badge);
    }

    list.appendChild(row);
  });

  currentWinner = null;
  document.getElementById('confirmBtn').style.display = 'none';
  document.getElementById('result').innerHTML = '<span class="result-sub">Press the button to pick someone</span>';
}

function pick() {
  const team = loadTeam();
  const done = whoHasDoneTeas();
  const active = team.filter(p => !done.has(p));

  if (active.length === 0) { renderPick(); return; }

  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  currentWinner = null;
  document.getElementById('confirmBtn').style.display = 'none';

  const result = document.getElementById('result');
  let ticks = 0;
  const total = 20 + Math.floor(Math.random() * 15);

  const interval = setInterval(() => {
    const r = active[Math.floor(Math.random() * active.length)];
    result.innerHTML = '<span class="result-name rolling">' + r + '</span>';
    ticks++;
    if (ticks >= total) {
      clearInterval(interval);
      const winner = active[Math.floor(Math.random() * active.length)];
      currentWinner = winner;
      result.innerHTML =
        '<span class="result-name">🎉 ' + winner + '</span>' +
        '<span class="result-sub">is on teas today!</span>';
      btn.disabled = false;
      document.getElementById('confirmBtn').style.display = 'block';
    }
  }, 100);
}

function confirmWinner() {
  if (!currentWinner) return;
  const history = loadHistory();
  const today = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  history.unshift({ name: currentWinner, date: today });
  saveHistory(history);
  currentWinner = null;
  document.getElementById('confirmBtn').style.display = 'none';
  renderPick();
}

function renderTeam() {
  const team = loadTeam();
  const done = whoHasDoneTeas();
  const list = document.getElementById('teamList');
  list.innerHTML = '';

  if (team.length === 0) {
    list.innerHTML = '<div class="empty-state">No players yet. Add some below.</div>';
    return;
  }

  team.forEach((p, i) => {
    const isDone = done.has(p);
    const row = document.createElement('div');
    row.className = 'player-row' + (isDone ? ' done-teas' : '');

    const num = document.createElement('span');
    num.className = 'player-num';
    num.textContent = i + 1;

    const name = document.createElement('span');
    name.className = 'player-name';
    name.textContent = p;

    const del = document.createElement('button');
    del.className = 'row-btn';
    del.setAttribute('aria-label', 'Remove ' + p);
    del.innerHTML = '&#10005;';
    del.onclick = () => {
      const t = loadTeam();
      t.splice(i, 1);
      saveTeam(t);
      renderTeam();
    };

    row.appendChild(num);
    row.appendChild(name);
    if (isDone) {
      const badge = document.createElement('span');
      badge.className = 'teas-badge';
      badge.textContent = '🍵 done';
      row.appendChild(badge);
    }
    row.appendChild(del);
    list.appendChild(row);
  });
}

function addPlayer() {
  const input = document.getElementById('newPlayerInput');
  const name = input.value.trim();
  if (!name) return;
  const team = loadTeam();
  if (!team.includes(name)) { team.push(name); saveTeam(team); }
  input.value = '';
  renderTeam();
}

function resetToDefault() {
  if (confirm('Reset squad to default team?')) {
    saveTeam([...DEFAULT_TEAM]);
    renderTeam();
  }
}

function renderHistory() {
  const history = loadHistory();
  const list = document.getElementById('historyList');
  list.innerHTML = '';

  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">No history yet.<br>Pick a volunteer to get started.</div>';
    return;
  }

  history.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'history-row';

    const left = document.createElement('div');
    left.innerHTML = '<span class="history-name">🍵 ' + h.name + '</span><br><span class="history-date">' + h.date + '</span>';

    const del = document.createElement('button');
    del.className = 'history-del';
    del.textContent = '✕';
    del.setAttribute('aria-label', 'Remove entry');
    del.onclick = () => {
      const hist = loadHistory();
      hist.splice(i, 1);
      saveHistory(hist);
      renderHistory();
    };

    row.appendChild(left);
    row.appendChild(del);
    list.appendChild(row);
  });
}

function clearHistory() {
  if (confirm('Clear all history? Everyone becomes eligible again for a new cycle.')) {
    saveHistory([]);
    renderHistory();
  }
}

renderPick();
</script>
</body>
</html>
